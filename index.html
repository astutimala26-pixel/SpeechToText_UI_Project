<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speech-to-Text Demo</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
  <div class="container mt-5">
    <h2 class="text-center mb-4">🎤 Speech-to-Text Demo</h2>

    <div class="text-center mb-3">
      <a href="dashboard.html" class="btn btn-primary">📊 View Statistics</a>
    </div>

    <div class="mb-3">
      <label for="language" class="form-label">Language:</label>
      <select id="language" class="form-select">
        <option value="en-US">English (United States)</option>
        <option value="en-GB">English (United Kingdom)</option>
        <option value="hi-IN">Hindi (India)</option>
      </select>
    </div>

    <div id="status" class="fw-bold text-center mb-3">Click start to speak</div>
    <div class="text-center mb-4">
      <button id="micBtn" class="btn btn-success btn-lg">🎤 Start</button>
    </div>

    <div class="mb-3">
      <label for="audioFile" class="form-label">Upload Audio File:</label>
      <input type="file" id="audioFile" class="form-control" accept="audio/*" />
    </div>
    <div class="text-center mb-3">
      <button id="uploadBtn" class="btn btn-warning">Upload & Transcribe</button>
    </div>

    <h4>Transcript:</h4>
    <div id="transcript" class="border p-3 bg-light" style="min-height: 80px;"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
