<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STT Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
  <div class="container mt-5">
    <h2 class="text-center mb-4">Speech-to-Text Dashboard</h2>
    <div class="row text-center">
      <div class="col-md-4 mb-3"><div class="card p-3 shadow-sm"><h5>Sessions</h5><p id="totalUploads" class="fs-3 fw-bold text-primary">0</p></div></div>
      <div class="col-md-4 mb-3"><div class="card p-3 shadow-sm"><h5>Total Words</h5><p id="totalWords" class="fs-3 fw-bold text-success">0</p></div></div>
      <div class="col-md-4 mb-3"><div class="card p-3 shadow-sm"><h5>Avg Duration</h5><p id="avgDuration" class="fs-3 fw-bold text-danger">0 min</p></div></div>
    </div>
    <div class="text-center mt-4">
      <button onclick="localStorage.clear(); location.reload();" class="btn btn-outline-danger">Clear History</button>
      <a href="index.html" class="btn btn-secondary ms-2">⬅ Back to App</a>
    </div>
  </div>
  <script>
    document.getElementById('totalUploads').innerText = localStorage.getItem('totalUploads') || 0;
    document.getElementById('totalWords').innerText = localStorage.getItem('totalWords') || 0;
    document.getElementById('avgDuration').innerText = localStorage.getItem('avgDuration') || '0 min';
  </script>
</body>
</html>
